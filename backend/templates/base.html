<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Production Monitoring Dashboard{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-dark text-light">

    <!-- Top Navbar -->
    <nav class="navbar navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">

            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-speedometer2"></i>
                Production Monitoring Dashboard
            </span>

            <span>
                <i class="bi bi-person-circle"></i>
                Admin
            </span>

        </div>
    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">

                <div class="list-group list-group-flush mt-3">

                    <a href="/dashboard" class="list-group-item list-group-item-action bg-black text-light">
                        <i class="bi bi-house"></i> Dashboard
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light">
                        <i class="bi bi-cpu"></i> System
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light">
                        <i class="bi bi-box"></i> Docker
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light">
                        <i class="bi bi-database"></i> Database
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light">
                        <i class="bi bi-file-earmark-text"></i> Logs
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light">
                        <i class="bi bi-bell"></i> Alerts
                    </a>

                </div>

            </div>

            <!-- Main Content -->
            <div class="col-md-10 main-content">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="/static/js/script.js"></script>

</body>

</html>
